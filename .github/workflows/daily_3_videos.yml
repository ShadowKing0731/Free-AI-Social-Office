name: Daily 3 Videos Auto-Post

on:
  schedule:
    - cron: '0 9 * * *'  # Every day at 9 AM UTC
  workflow_dispatch:

jobs:
  create-3-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger 3 Daily Videos
        run: |
          curl -X POST https://huggingface.co/spaces/dhanushmolina/ai-free-social-backend/daily-3-videos \
          -H "Content-Type: application/json" \
          -d '{"auto": true}'
